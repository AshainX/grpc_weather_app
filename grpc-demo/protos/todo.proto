syntax = "proto3";

package todo;

message Todo {
    int32 id = 1;
    string title = 2;
    string description = 3;
    bool completed = 4;
    int64 created_at = 5;      // Unix timestamp
    int64 updated_at = 6;      // Unix timestamp
    string priority = 7;       // "low", "medium", "high"
    repeated string tags = 8;   // List of tags
}

message CreateTodoRequest {
    string title = 1;
    string description = 2;
    string priority = 3;       // "low", "medium", "high"
    repeated string tags = 4;
}

message UpdateTodoRequest {
    int32 id = 1;
    string title = 2;
    string description = 3;
    bool completed = 4;
    string priority = 5;
    repeated string tags = 6;
}

message GetTodoRequest {
    int32 id = 1;
}

message DeleteTodoRequest {
    int32 id = 1;
}

message ListTodosRequest {
    bool show_completed_only = 1;
    string priority_filter = 2;
    string tag_filter = 3;
}

message ListTodosResponse {
    repeated Todo todos = 1;
}

message TodoActionResponse {
    bool success = 1;
    string message = 2;
    Todo todo = 3;
}

// Todo Service definition
service TodoService {
    // Create a new todo
    rpc CreateTodo(CreateTodoRequest) returns (TodoActionResponse);
    
    // Get a todo by ID
    rpc GetTodo(GetTodoRequest) returns (TodoActionResponse);
    
    // Update an existing todo
    rpc UpdateTodo(UpdateTodoRequest) returns (TodoActionResponse);
    
    // Delete a todo
    rpc DeleteTodo(DeleteTodoRequest) returns (TodoActionResponse);
    
    // List all todos with optional filters
    rpc ListTodos(ListTodosRequest) returns (ListTodosResponse);
    
    // Toggle todo completion status
    rpc ToggleTodoComplete(GetTodoRequest) returns (TodoActionResponse);
    
    // Clear all completed todos
    rpc ClearCompletedTodos(ListTodosRequest) returns (TodoActionResponse);
}